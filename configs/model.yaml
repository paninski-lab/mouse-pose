data:
  image_resize_dims:
    height: 256
    width: 256
  data_dir: /media/mattw/poseinterface/data/head-fixed
  video_dir: ${data.data_dir}/videos
  csv_file: CollectedData.csv
  num_keypoints: 41
  keypoint_names:
  # ── eye ───────────────────────────────────────────────────────────────────
  - eye_back_left
  - eye_back_right
  - eye_bottom_left
  - eye_bottom_right
  - eye_front_left
  - eye_front_right
  - eye_top_left
  - eye_top_right
  - pupil_center_left
  - pupil_center_right
  # ── nose / mouth (lateralized) ────────────────────────────────────────────
  - upperlip_right
  - upperlip_left
  - tongue_end_right
  - tongue_end_left
  # ── nose / mouth (midline) ────────────────────────────────────────────────
  - nose_bridge
  - nose_tip
  - nose_top
  - nose_bottom
  - pad_center
  - mouth
  - lowerlip
  # ── whiskers ──────────────────────────────────────────────────────────────
  - whisker_c1_left
  - whisker_c1_right
  - whisker_c2_left
  - whisker_c2_right
  - whisker_d1_left
  - whisker_d1_right
  - pad_top_left
  - pad_top_right
  - pad_side_left
  - pad_side_right
  # ── ears ──────────────────────────────────────────────────────────────────
  - ear_top_left
  - ear_top_right
  - ear_tip_left
  - ear_tip_right
  - ear_bottom_left
  - ear_bottom_right
  - ear_base_left
  - ear_base_right
  # ── paw ───────────────────────────────────────────────────────────────────
  - wrist_left
  - wrist_right
  columns_for_singleview_pca: null

training:
  imgaug: dlc
  imgaug_hflip: true
  train_batch_size: 32
  val_batch_size: 64
  test_batch_size: 64
  train_prob: 0.95
  val_prob: 0.05
  train_frames: 1
  num_gpus: 1
  unfreezing_step: 1000
  min_steps: 12000
  max_steps: 12000
  log_every_n_steps: 10
  check_val_every_n_epoch: 10
  rng_seed_data_pt: 0
  rng_seed_model_pt: 0
  optimizer: Adam
  optimizer_params:
    learning_rate: 1e-3
  lr_scheduler: multisteplr
  lr_scheduler_params:
    multisteplr:
      milestone_steps: [4000, 6000, 8000]
      gamma: 0.5

model:
  losses_to_use: []
  backbone: resnet50_animal_ap10k
  model_type: heatmap
  heatmap_loss_type: mse
  model_name: test

dali:
  general:
    seed: 123456
  base:
    train:
      sequence_length: 32
    predict:
      sequence_length: 64
  context:
    train:
      batch_size: 16
    predict:
      sequence_length: 64

losses:
  pca_singleview:
    log_weight: 10.7
    components_to_keep: 0.99
    epsilon: null
  temporal:
    log_weight: 10.7
    epsilon: 10.0
    prob_threshold: 0.05

eval:
  predict_vids_after_training: false
  save_vids_after_training: false
  test_videos_directory: ${data.data_dir}/videos
  confidence_thresh_for_vid: 0.90

callbacks:
  anneal_weight:
    attr_name: total_unsupervised_importance
    init_val: 0.0
    increase_factor: 0.01
    final_val: 1.0
    freeze_until_epoch: 60
